# Templated from atheory-ai/release-template
# Copy as-is — no placeholders.
#
# Keeps GitHub Actions SHA-pinned references current. Major-version
# bumps often include breaking changes (e.g., golangci-lint-action
# v7 dropped golangci-lint v1 support; actions/upload-artifact v5
# changed artifact behaviour). We group ALL bumps — including majors
# — into a single weekly PR so they get triaged together rather than
# arriving as a flood of individual major-bump PRs.

version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: "America/Los_Angeles"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
      include: scope
    groups:
      actions:
        update-types:
          - patch
          - minor
          - major
