name: CI

# Derived from atheory-ai/release-template v0.2.6.
# Adds: golangci-lint, govulncheck, race detector. Preserves skillex's
# acceptance test job (which needs Node.js + pnpm/yarn for fixture
# packages) and npm packaging smoke test.
#
# All third-party actions pinned to commit SHAs (Tier 2 hardening);
# inline comments are the semver tag at pinning. Dependabot keeps
# them current — see .github/dependabot.yml.
#
# Skipped vs. template: coverage gate (no test/coverage/ infrastructure
# yet — follow-up).

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          files=$(git ls-files '*.go')
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee  # v9.2.1
        with:
          # action v7+ requires golangci-lint v2.x. Config schema
          # migrated via `golangci-lint migrate`.
          version: v2.12.2
          args: --timeout=5m

  vuln:
    name: Vuln Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        # Uses the official govulncheck-action which picks a version
        # compatible with the project's go.mod (avoids needing
        # `@latest` which now requires Go >= 1.25).
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee  # v1.0.4
        with:
          go-version-file: go.mod
          check-latest: true

  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Run unit tests
        run: go test $(go list ./... | grep -v '/test/acceptance$')
      - name: Build CLI
        run: make build
      - name: Check installer
        run: sh -n install.sh

  race:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Race test
        run: go test -race $(go list ./... | grep -v '/test/acceptance$')

  acceptance:
    name: Acceptance
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: 24
      - name: Enable pnpm and yarn
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          corepack prepare yarn@1.22.22 --activate
      - name: Run fixture acceptance tests
        run: make test-acceptance

  npm_packages:
    name: npm Packaging Smoke Test
    runs-on: ubuntu-latest
    needs: acceptance
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5.0.1
        with:
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: 24
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6.5.0
        with:
          install-only: true
          version: "~> v2"
      - name: Build snapshot archives
        run: goreleaser build --snapshot --clean
      - name: Sync npm package versions
        run: node scripts/set-npm-version.mjs $(cat VERSION)
      - name: Build npm tarballs
        run: VERSION=$(cat VERSION) PACKAGE_VERSION=$(cat VERSION) make npm-pack
      - name: Upload npm tarballs
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4.6.2
        with:
          name: npm-tarballs-ci
          path: dist/*.tgz
          if-no-files-found: error
