name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Check Go formatting
        shell: bash
        run: |
          files=$(git ls-files '*.go')
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run unit tests
        shell: bash
        run: go test $(go list ./... | grep -v '/test/acceptance$')

      - name: Build CLI
        run: make build

  acceptance:
    runs-on: ubuntu-latest
    needs: verify

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable pnpm and yarn
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          corepack prepare yarn@1.22.22 --activate

      - name: Run fixture acceptance tests
        run: make test-acceptance

  npm_packages:
    runs-on: ubuntu-latest
    needs: acceptance

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Sync npm package versions
        run: node scripts/set-npm-version.mjs

      - name: Build npm tarballs
        run: VERSION=$(cat VERSION) PACKAGE_VERSION=$(cat VERSION) make npm-pack

      - name: Upload npm tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs-ci
          path: dist/*.tgz
          if-no-files-found: error
