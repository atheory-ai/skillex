name: CI

# Derived from atheory-ai/release-template v0.2.0.
# Adds: golangci-lint, govulncheck, race detector. Preserves skillex's
# acceptance test job (which needs Node.js + pnpm/yarn for fixture
# packages) and npm packaging smoke test.
#
# Skipped vs. template: coverage gate (no test/coverage/ infrastructure
# yet — follow-up).

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Check formatting
        run: |
          files=$(git ls-files '*.go')
          if [ -z "$files" ]; then
            exit 0
          fi
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

  lint:
    name: Lint (golangci-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          # Pinned to v1.x — the v2 config schema is incompatible.
          # Migration to v2 is a separate cross-project task.
          version: v1.64.0
          args: --timeout=5m

  vuln:
    name: Vuln Scan (govulncheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run govulncheck
        # Uses the official govulncheck-action which picks a version
        # compatible with the project's go.mod (avoids needing
        # `@latest` which now requires Go >= 1.25).
        uses: golang/govulncheck-action@v1
        with:
          go-version-file: go.mod
          check-latest: true

  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Run unit tests
        run: go test $(go list ./... | grep -v '/test/acceptance$')
      - name: Build CLI
        run: make build
      - name: Check installer
        run: sh -n install.sh

  race:
    name: Race Detector
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Race test
        run: go test -race $(go list ./... | grep -v '/test/acceptance$')

  acceptance:
    name: Acceptance
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Enable pnpm and yarn
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          corepack prepare yarn@1.22.22 --activate
      - name: Run fixture acceptance tests
        run: make test-acceptance

  npm_packages:
    name: npm Packaging Smoke Test
    runs-on: ubuntu-latest
    needs: acceptance
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
          version: "~> v2"
      - name: Build snapshot archives
        run: goreleaser build --snapshot --clean
      - name: Sync npm package versions
        run: node scripts/set-npm-version.mjs $(cat VERSION)
      - name: Build npm tarballs
        run: VERSION=$(cat VERSION) PACKAGE_VERSION=$(cat VERSION) make npm-pack
      - name: Upload npm tarballs
        uses: actions/upload-artifact@v4
        with:
          name: npm-tarballs-ci
          path: dist/*.tgz
          if-no-files-found: error
