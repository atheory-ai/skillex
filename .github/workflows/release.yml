name: Release

# Derived from atheory-ai/release-template v0.2.0 (release-full pattern).
# Adds: cosign keyless signing, SLSA L2 provenance, SPDX SBOM, brew
# formula (via goreleaser brews block).
#
# Preserves skillex's: acceptance tests as a release gate, npm tarball
# build + gated publish via npm-release environment.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify_release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_version.outputs.version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure tag points to main
        shell: bash
        run: |
          git fetch origin main --depth=1
          if ! git branch -r --contains "$GITHUB_SHA" | grep -q "origin/main"; then
            echo "Release tags must point to a commit on origin/main."
            exit 1
          fi

      - name: Read release version
        id: release_version
        shell: bash
        run: |
          file_version=$(cat VERSION)
          tag_version="${GITHUB_REF#refs/tags/v}"
          if [[ "$tag_version" != "$file_version" ]]; then
            echo "Tag version does not match VERSION file."
            echo "tag:  $tag_version"
            echo "file: $file_version"
            exit 1
          fi
          echo "version=$tag_version" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          # Cache disabled in privileged release flows — a poisoned cache
          # could inject artifacts into the signing path. CI keeps cache: true.
          cache: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: 24

      - name: Enable pnpm and yarn
        run: |
          corepack enable
          corepack prepare pnpm@latest --activate
          corepack prepare yarn@1.22.22 --activate

      - name: Check formatting
        run: |
          files=$(git ls-files '*.go')
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Run unit tests
        run: go test $(go list ./... | grep -v '/test/acceptance$')

      - name: Run acceptance tests
        run: make test-acceptance

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6.5.0
        with:
          install-only: true
          version: "~> v2"

      - name: Check installer
        run: sh -n install.sh

      - name: Build release archives (no publish yet)
        run: goreleaser release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@dc72c7d5c4d10cd6bcb8cf6e3fd625a9e5e537da  # v3.7.0

      - name: Sign release archives (keyless OIDC)
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in dist/skillex_*.tar.gz dist/skillex_*.zip; do
            echo "Signing $f"
            cosign sign-blob --yes --bundle "$f.bundle" "$f"
          done

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610  # v0.20.6
        with:
          path: dist
          format: spdx-json
          output-file: dist/sbom.spdx.json
          upload-artifact: false
          upload-release-assets: false

      - name: Attest build provenance (SLSA L2)
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-path: 'dist/skillex_*.tar.gz,dist/skillex_*.zip'

      - name: Sync npm package versions
        run: node scripts/set-npm-version.mjs "${{ steps.release_version.outputs.version }}"

      - name: Build npm tarballs
        run: VERSION=${{ steps.release_version.outputs.version }} PACKAGE_VERSION=${{ steps.release_version.outputs.version }} make npm-pack

      - name: Upload release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: skillex-release-assets
          path: |
            dist/skillex_*.tar.gz
            dist/skillex_*.zip
            dist/checksums.txt
            dist/*.bundle
            dist/sbom.spdx.json
          if-no-files-found: error

      - name: Upload npm tarballs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: skillex-npm-tarballs
          path: dist/*.tgz
          if-no-files-found: error

  publish_npm:
    runs-on: ubuntu-latest
    needs: verify_release
    environment:
      name: npm-release
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        id: download_tarballs
        with:
          name: skillex-npm-tarballs
          path: dist
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.0.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Publish platform + wrapper packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.verify_release.outputs.version }}
        run: |
          tar_dir="$(realpath "${{ steps.download_tarballs.outputs.download-path }}")"
          for tarball in \
            "$tar_dir/atheory-ai-skillex-darwin-arm64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-skillex-darwin-x64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-skillex-linux-arm64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-skillex-linux-x64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-skillex-win32-x64-${VERSION}.tgz" \
            "$tar_dir/atheory-ai-skillex-${VERSION}.tgz"; do
            if [ ! -f "$tarball" ]; then
              echo "Missing tarball: $tarball"
              exit 1
            fi
            npm publish "$tarball" --access public --provenance
          done

  publish_release:
    runs-on: ubuntu-latest
    needs: [verify_release, publish_npm]
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          name: skillex-release-assets
          path: release-assets
      - name: Publish GitHub release (archives + signatures + SBOM)
        uses: softprops/action-gh-release@2bb465e97f322d3cb2a965294d483e0d26a67aa9  # v3.0.1
        with:
          generate_release_notes: true
          files: release-assets/*

  publish_brew:
    runs-on: ubuntu-latest
    needs: [verify_release, publish_release]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.0.0
        with:
          go-version-file: go.mod
          # Cache disabled in privileged release flows — a poisoned cache
          # could inject artifacts into the signing path. CI keeps cache: true.
          cache: false
      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a  # v6.5.0
        with:
          install-only: true
          version: "~> v2"
      - name: Push to Homebrew tap
        # Re-runs goreleaser to publish the formula. By this point the
        # GitHub release exists, so the formula points at the right
        # archive URLs.
        run: goreleaser release --clean --skip=archive,build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
